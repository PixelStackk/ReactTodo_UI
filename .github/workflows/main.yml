name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  lint:
    name: Lint
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Markdown (markdownlint)
        shell: pwsh
        run: |
          npm install -g markdownlint-cli
          markdownlint .

  build:
    name: Build
    needs: lint
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: NPM Install
        run: npm install

      - name: NPM Run Build
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-ui
          path: build/
