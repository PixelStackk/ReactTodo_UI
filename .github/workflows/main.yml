name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  lint:
    name: Lint
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint JavaScript (Biome)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/biomejs/biome/releases/download/%40biomejs%2Fbiome%402.3.8/biome-win32-x64.exe" -OutFile "$env:RUNNER_TEMP/biome.exe"
          $env:RUNNER_TEMP/biome.exe lint ./src/

      - name: Lint CSS (Stylelint)
        shell: pwsh
        run: |
          npm install -g stylelint
          npm install -g stylelint-config-standard
          stylelint ./src --config stylelint.config.mjs

      - name: Lint YAML (yamllint)
        shell: pwsh
        run: |
          pip install yamllint
          yamllint .

      - name: Lint Markdown (markdownlint)
        shell: pwsh
        run: |
          npm install -g markdownlint-cli
          markdownlint .

  build:
    name: Build
    needs: lint
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: NPM Install
        run: npm install

      - name: NPM Run Build
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-ui
          path: build/
